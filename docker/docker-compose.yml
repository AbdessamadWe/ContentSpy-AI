version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    volumes:
      - ..:/workspace
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - mysql
      - redis
      - mongodb
      - meilisearch
    command: sleep infinity

  frontend:
    image: node:20-alpine
    working_dir: /workspace/frontend
    volumes:
      - ..:/workspace
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  playwright:
    build:
      context: ..
      dockerfile: docker/Dockerfile.playwright
    ports:
      - "3001:3001"
    env_file:
      - ../.env

  ffmpeg:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ffmpeg
    ports:
      - "3002:3002"
    env_file:
      - ../.env

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: contentspy
      MYSQL_USER: contentspy
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_DATABASE: contentspy_raw
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  meilisearch:
    image: getmeili/meilisearch:v1.8
    restart: always
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    environment:
      MEILI_MASTER_KEY: masterkey

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  meili_data:

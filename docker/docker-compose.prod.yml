version: '3.8'

services:
  # Nginx reverse proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: contentspy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./storage:/var/www/html/storage
    depends_on:
      - app
    networks:
      - contentspy

  # PHP-FPM application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: contentspy-app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://contentspy.ai
    volumes:
      - ./backend:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      - mysql
      - redis
    networks:
      - contentspy
    restart: unless-stopped

  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: contentspy-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - contentspy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and queue
  redis:
    image: redis:7-alpine
    container_name: contentspy-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - contentspy
    restart: unless-stopped

  # MongoDB for spy snapshots
  mongo:
    image: mongo:7
    container_name: contentspy-mongo
    environment:
      - MONGO_INITDB_DATABASE=contentspy_spy
    volumes:
      - mongo_data:/data/db
    networks:
      - contentspy
    restart: unless-stopped

  # Meilisearch for full-text search
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: contentspy-meilisearch
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - contentspy
    restart: unless-stopped

  # Laravel Horizon queue worker
  horizon:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: contentspy-horizon
    command: php artisan horizon
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
      - mongo
      - meilisearch
    networks:
      - contentspy
    restart: unless-stopped

  # Soketi WebSocket server
  soketi:
    image: contentful/soketi:1000
    container_name: contentspy-soketi
    environment:
      - SOKETI_PORT=6001
      - SOKETI_DEBUG=false
      - SOKETI_METRICS_ENABLED=true
    networks:
      - contentspy
    restart: unless-stopped

  # Playwright scraper microservice
  playwright:
    build:
      context: ./services/playwright
      dockerfile: Dockerfile
    container_name: contentspy-playwright
    environment:
      - NODE_ENV=production
    networks:
      - contentspy
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN

  # FFmpeg video assembly microservice
  ffmpeg:
    build:
      context: ./services/ffmpeg
      dockerfile: Dockerfile
    container_name: contentspy-ffmpeg
    environment:
      - NODE_ENV=production
    networks:
      - contentspy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

networks:
  contentspy:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  mongo_data:
  meilisearch_data: